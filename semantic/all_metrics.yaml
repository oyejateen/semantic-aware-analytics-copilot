# =============================================================================
# Semantic Layer — Metric Definitions
# Source of truth for all certified metrics and ambiguous business terms.
#
# Structure:
#   metrics        → list of metric definitions
#   ambiguous_terms → list of terms that need clarification before SQL gen
#
# When to update:
#   - Add a metric       → append to `metrics` list, re-embed
#   - Fill in a TBD      → update the field, flip certified: true, re-embed
#   - Add an ambiguous term → append to `ambiguous_terms`, re-embed
# =============================================================================

metrics:

  - name: occupancy_rate
    label: "Occupancy Rate"
    description: >
      Percentage of available nights that were booked for a listing
      in a given period. Excludes nights blocked by the host
      (not truly available for booking).
    grain: monthly
    base_table: dbt_dev.mart_occupancy
    numerator: booked_nights
    denominator: total_nights
    filters:
      - "month BETWEEN :start_date AND :end_date"
    joins: []
    caveats:
      - "Inside Airbnb availability data is scraped, not authoritative."
      - "Blocked nights may include both host blocks and platform-level blocks."
      - "available=false includes host-blocked nights; ~238k listing-months show occupancy_rate=1.0 (all nights blocked), overstating true booking activity."
    todos:
      - "Distinguish host-blocked nights from actual bookings to fix the occupancy_rate=1.0 spike."
    owner: jamie
    certified: true
    last_validated: "2026-06-17"

  - name: avg_nightly_rate
    label: "Average Nightly Rate"
    description: >
      Average price per booked night for a listing or group of listings
      in a given period. Excludes nights that were unavailable/blocked,
      since those don't reflect an actual transaction price.
    grain: monthly
    base_table: "TBD - will be mart_revenue after dbt modeling"
    numerator: "TBD - sum of price for nights where available = 'f'"
    denominator: "TBD - count of nights where available = 'f'"
    filters:
      - "date BETWEEN :start_date AND :end_date"
    joins: []
    caveats:
      - "Price values from Inside Airbnb calendar are scraped daily; may not reflect final transaction price (cleaning fees, discounts not included)."
      - "Currency assumed USD."
    owner: jamie
    certified: false
    last_validated: null

  - name: review_velocity
    label: "Review Velocity"
    description: >
      Number of reviews received in a trailing 30-day window for a
      listing or group of listings. Used as a proxy signal for recent
      booking activity, since not all bookings result in a review.
    grain: trailing_30_day
    base_table: "TBD - will be mart_reviews after dbt modeling"
    numerator: "TBD - count of reviews where date BETWEEN (today - 30 days) AND today"
    denominator: null
    filters:
      - "review_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)"
    joins:
      - "TBD - join path reviews -> listings (for neighbourhood/room_type breakdowns)"
    caveats:
      - "Review velocity is a proxy for booking activity, not a direct measure. Not all guests leave reviews."
      - "Subject to review posting delays (guests often review after checkout)."
    owner: jamie
    certified: false
    last_validated: null


ambiguous_terms:

  - term: "availability"
    candidates: ["occupancy_rate"]
    clarification: >
      Do you mean the percentage of nights booked (occupancy rate),
      or the raw count of open/available nights?

  - term: "revenue"
    candidates: ["avg_nightly_rate"]
    clarification: >
      Do you mean the average price per booked night (avg_nightly_rate),
      or revenue per available night (RevPAN), which includes unbooked
      nights in the denominator?

  - term: "activity"
    candidates: ["occupancy_rate"]
    clarification: >
      Do you mean recent booking activity as measured by reviews
      (review_velocity), or actual occupancy (occupancy_rate)?
